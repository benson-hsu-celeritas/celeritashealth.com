<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; background: #13253D; font-family: 'DM Serif Display', serif; display: flex; align-items: center; justify-content: center; }
.card { text-align: center; }
.logo { font-size: 1.4rem; color: rgba(255,255,255,0.6); margin-bottom: 2rem; font-family: sans-serif; }
.logo span { color: #2563A8; }
h1 { font-size: 3.2rem; color: white; line-height: 1.15; max-width: 800px; }
h1 em { color: #5B9FE4; font-style: italic; }
p { font-size: 1.3rem; color: rgba(255,255,255,0.55); margin-top: 1.5rem; font-family: sans-serif; font-weight: 300; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
<div class="logo">Celeritas<span>Health</span></div>
<h1>A child's life shouldn't depend on <em>geography</em></h1>
<p>Pediatric expertise via SMS & WhatsApp in under 15 seconds</p>
</div>
</body>
</html>
