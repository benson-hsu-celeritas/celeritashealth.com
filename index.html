:1fr !important}[style*=\"grid-template-columns: 200px 1fr\"] img{max-width:200px}[style*=\"grid-template-columns: 132px 1fr\"]{grid-template-columns:1fr !important}}<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body { margin: 0; background: #f4f5f8; color: #121722; font-family: 'Hanken Grotesk', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }\n  a { color: #2f5cff; text-decoration: none; }\n  a:hover { color: #1b44d6; }\n  ::selection { background: rgba(47,92,255,0.18); }\n  @keyframes cel-pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }\n  @keyframes cel-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div ref=\"{{ setRoot }}\" style=\"position: relative; width: 100%; background: #f4f5f8;\">\n\n  <!-- NAV -->\n  <nav style=\"position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 16px clamp(18px, 5vw, 64px); backdrop-filter: blur(14px); background: rgba(244,245,248,0.82); border-bottom: 1px solid rgba(17,23,34,0.08);\">\n    <a href=\"index.html\" style=\"display: flex; align-items: center; gap: 12px; color: #121722;\">\n      <span style=\"position: relative; width: 24px; height: 24px; display: inline-flex; transform: rotate(45deg); border: 1.5px solid var(--acc,#2f5cff);\"><span style=\"position: absolute; inset: 4px; border: 1px solid #0e9aa7;\"><\u002Fspan><\u002Fspan>\n      <span style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 16px; letter-spacing: 0.16em; text-transform: uppercase;\">Celeritas<\u002Fspan>\n    <\u002Fa>\n    <div style=\"display: flex; flex-wrap: wrap; justify-content: flex-end; row-gap: 8px; align-items: center; gap: clamp(12px, 1.8vw, 28px); font-family: 'JetBrains Mono', monospace; font-size: 11.5px; letter-spacing: 0.06em;\">\n      <a href=\"#work\" style=\"color: #4c5568;\">WORK<\u002Fa>\n      <a href=\"codebluepeds.html\" style=\"color: #4c5568;\">CODEBLUE<\u002Fa>\n      <a href=\"research.html\" style=\"color: #4c5568;\">RESEARCH<\u002Fa>\n      <a href=\"#approach\" style=\"color: #4c5568;\">APPROACH<\u002Fa>\n      <a href=\"#contact\" style=\"display: inline-flex; align-items: center; gap: 8px; color: #fff; background: var(--acc,#2f5cff); padding: 8px 15px; border-radius: 4px;\">CONTACT →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- HERO -->\n  <section data-screen-label=\"Hero\" style=\"position: relative; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 150px clamp(20px, 5vw, 64px) 90px; overflow: hidden;\">\n    <canvas ref=\"{{ setMesh }}\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0;\"><\u002Fcanvas>\n    <div style=\"position: absolute; inset: 0; z-index: 1; pointer-events: none; background:\n      linear-gradient(rgba(47,92,255,0.045) 1px, transparent 1px) 0 0 / 64px 64px,\n      linear-gradient(90deg, rgba(47,92,255,0.045) 1px, transparent 1px) 0 0 / 64px 64px,\n      radial-gradient(ellipse 92% 62% at 50% 42%, transparent 34%, rgba(244,245,248,0.72) 100%);\"><\u002Fdiv>\n\n    <div style=\"position: relative; z-index: 2; max-width: 1120px;\">\n      <div data-reveal=\"\" style=\"display: flex; align-items: center; gap: 14px; margin-bottom: 34px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; letter-spacing: 0.16em; color: #6a7285; text-transform: uppercase;\">\n        <span style=\"width: 8px; height: 8px; background: #0e9aa7; border-radius: 50%; box-shadow: 0 0 10px rgba(14,154,167,0.6); animation: cel-pulse 2.4s ease-in-out infinite;\"><\u002Fspan>\n        Clinical&nbsp;AI&nbsp;·&nbsp;Built&nbsp;&amp;&nbsp;Examined\n      <\u002Fdiv>\n      <h1 data-reveal=\"\" style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: clamp(38px, 6.6vw, 92px); line-height: 0.98; letter-spacing: -0.025em; margin: 0 0 30px; max-width: 15ch; color: #0d111a;\">\n        The clinical AI company that <span style=\"color: var(--acc,#2f5cff);\">shows its work.<\u002Fspan>\n      <\u002Fh1>\n      <p data-reveal=\"\" style=\"font-size: clamp(17px, 1.9vw, 22px); line-height: 1.55; color: #4c5568; max-width: 62ch; margin: 0 0 44px;\">\n        Celeritas builds AI for the places medicine is hardest to reach — and studies how anyone should test whether clinical AI is actually right. Two threads, one discipline: <em style=\"color: #121722; font-style: normal;\">assume it fails, find where, and make the dangerous failure impossible or visible<\u002Fem> — starting with an AI that never states a drug dose.\n      <\u002Fp>\n      <div data-reveal=\"\" style=\"display: flex; flex-wrap: wrap; gap: 14px;\">\n        <a href=\"#work\" style=\"display: inline-flex; align-items: center; gap: 10px; background: var(--acc,#2f5cff); color: #fff; padding: 15px 26px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.04em; font-weight: 500;\">Explore the work <span aria-hidden=\"true\">→<\u002Fspan><\u002Fa>\n        <a href=\"research.html\" style=\"display: inline-flex; align-items: center; gap: 10px; background: #fff; color: #121722; padding: 15px 26px; border-radius: 6px; border: 1px solid rgba(17,23,34,0.14); font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.04em;\">Read the research<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MISSION STRIP -->\n  <section data-screen-label=\"Mission\" style=\"position: relative; padding: clamp(70px, 12vh, 130px) clamp(20px, 5vw, 64px); border-top: 1px solid rgba(17,23,34,0.07); background: #eaecf1;\">\n    <div data-reveal=\"\" style=\"max-width: 1000px; margin: 0 auto; text-align: center;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11.5px; letter-spacing: 0.18em; color: var(--acc,#2f5cff); text-transform: uppercase; margin-bottom: 26px;\">Why we exist<\u002Fdiv>\n      <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: clamp(24px, 3.4vw, 40px); line-height: 1.32; letter-spacing: -0.01em; margin: 0; color: #1a2030; text-wrap: balance;\">\n        You cannot credibly judge clinical AI unless you have built one and lived with its failure modes. So we do both — <span style=\"color: var(--acc,#2f5cff);\">we build it to a standard,<\u002Fspan> and we research <span style=\"color: #0e9aa7;\">how everyone else's should be tested.<\u002Fspan>\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHAT WE BELIEVE / DOCTRINE -->\n  <section id=\"approach\" data-screen-label=\"Approach\" style=\"position: relative; padding: clamp(80px, 12vh, 140px) clamp(20px, 5vw, 64px); border-top: 1px solid rgba(17,23,34,0.07);\">\n    <div style=\"max-width: 1200px; margin: 0 auto;\">\n      <div data-reveal=\"\" style=\"display: flex; align-items: baseline; gap: 18px; margin-bottom: 20px;\">\n        <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--acc,#2f5cff); letter-spacing: 0.1em;\">01<\u002Fspan>\n        <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: clamp(28px, 4vw, 48px); letter-spacing: -0.02em; margin: 0; color: #0d111a;\">What we believe<\u002Fh2>\n      <\u002Fdiv>\n      <p data-reveal=\"\" style=\"font-size: clamp(16px, 1.8vw, 20px); line-height: 1.6; color: #4c5568; max-width: 60ch; margin: 0 0 50px;\">One engineering doctrine runs through everything Celeritas touches — the build and the research alike.<\u002Fp>\n      <div data-reveal=\"\" style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1px; background: rgba(17,23,34,0.09); border: 1px solid rgba(17,23,34,0.09); border-radius: 10px; overflow: hidden;\">\n        <div style=\"background:#fff;padding:30px 26px;\"><p style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--acc,#2f5cff);margin:0 0 12px;\">→ ASSUME FAILURE<\u002Fp><p style=\"font-size:14px;line-height:1.6;color:#4c5568;margin:0;\">Design for the failure mode first. The dangerous failure is a confident wrong answer.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;padding:30px 26px;\"><p style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--acc,#2f5cff);margin:0 0 12px;\">→ MEASURE THE DANGER<\u002Fp><p style=\"font-size:14px;line-height:1.6;color:#4c5568;margin:0;\">Not \"how often right\" but \"how often confidently wrong\" — on tests a system can genuinely fail.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;padding:30px 26px;\"><p style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--acc,#2f5cff);margin:0 0 12px;\">→ ENFORCE IN CODE<\u002Fp><p style=\"font-size:14px;line-height:1.6;color:#4c5568;margin:0;\">Safety-critical behavior is a deterministic code path, not a polite request to a model.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;padding:30px 26px;\"><p style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--acc,#2f5cff);margin:0 0 12px;\">→ NO SELF-GRADING<\u002Fp><p style=\"font-size:14px;line-height:1.6;color:#4c5568;margin:0;\">Let no model grade its own work. Independent review, or it doesn't ship.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;padding:30px 26px;\"><p style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--acc,#2f5cff);margin:0 0 12px;\">→ DOCUMENT LIMITS<\u002Fp><p style=\"font-size:14px;line-height:1.6;color:#4c5568;margin:0;\">Known blind spots are written down and tested as known failures — not discovered by the user.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WORK -->\n  <section id=\"work\" data-screen-label=\"Work\" style=\"position: relative; padding: clamp(80px, 12vh, 140px) clamp(20px, 5vw, 64px); border-top: 1px solid rgba(17,23,34,0.07); background: #eaecf1;\">\n    <div style=\"max-width: 1200px; margin: 0 auto;\">\n      <div data-reveal=\"\" style=\"display: flex; align-items: baseline; gap: 18px; margin-bottom: 50px;\">\n        <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--acc,#2f5cff); letter-spacing: 0.1em;\">02<\u002Fspan>\n        <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: clamp(28px, 4vw, 48px); letter-spacing: -0.02em; margin: 0; color: #0d111a;\">Two lines of work<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 22px;\">\n        <a href=\"codebluepeds.html\" data-reveal=\"\" style=\"position: relative; display: block; padding: 34px; background: #fff; border: 1px solid rgba(17,23,34,0.09); border-radius: 14px; overflow: hidden; color: inherit; box-shadow: 0 1px 2px rgba(17,23,34,0.04); transition: transform .35s, box-shadow .35s, border-color .35s;\" style-hover=\"transform: translateY(-4px); box-shadow: 0 14px 34px rgba(17,23,34,0.12); border-color: rgba(47,92,255,0.4);\">\n          <div style=\"position: absolute; top: 0; right: 0; width: 180px; height: 180px; background: radial-gradient(circle at 100% 0%, rgba(47,92,255,0.1), transparent 70%); pointer-events: none;\"><\u002Fdiv>\n          <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: #0e9aa7; margin-bottom: 18px;\">▸ BUILD · IN PRODUCTION<\u002Fdiv>\n          <h3 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 27px; margin: 0 0 12px; color: #0d111a;\">CodeBlue Peds<\u002Fh3>\n          <p style=\"font-size: 15.5px; line-height: 1.6; color: #4c5568; margin: 0 0 24px;\">Pediatric protocol guidance over plain SMS — grounded in an institution's own validated protocols, PHI-stripped in code, independently reviewed, and engineered to fail safe. No app, no login. The interface is a phone number.<\u002Fp>\n          <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--acc,#2f5cff);\">See how it works →<\u002Fspan>\n        <\u002Fa>\n        <a href=\"research.html\" data-reveal=\"\" style=\"position: relative; display: block; padding: 34px; background: #fff; border: 1px solid rgba(17,23,34,0.09); border-radius: 14px; overflow: hidden; color: inherit; box-shadow: 0 1px 2px rgba(17,23,34,0.04); transition: transform .35s, box-shadow .35s, border-color .35s;\" style-hover=\"transform: translateY(-4px); box-shadow: 0 14px 34px rgba(17,23,34,0.12); border-color: rgba(14,154,167,0.45);\">\n          <div style=\"position: absolute; top: 0; right: 0; width: 180px; height: 180px; background: radial-gradient(circle at 100% 0%, rgba(14,154,167,0.12), transparent 70%); pointer-events: none;\"><\u002Fdiv>\n          <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: #0e9aa7; margin-bottom: 18px;\">▸ RESEARCH · IN DEVELOPMENT<\u002Fdiv>\n          <h3 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 27px; margin: 0 0 12px; color: #0d111a;\">Testing clinical AI<\u002Fh3>\n          <p style=\"font-size: 15.5px; line-height: 1.6; color: #4c5568; margin: 0 0 24px;\">An open exploration of a hard, unanswered question: <em style=\"color: #1a2030; font-style: normal;\">how should anyone test whether a healthcare-AI system's clinical outputs are actually correct?<\u002Fem> Methods and preprints, developed openly — pediatrics first.<\u002Fp>\n          <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: #0e9aa7;\">Read the research →<\u002Fspan>\n        <\u002Fa>\n        <div data-reveal=\"\" style=\"position: relative; display: flex; flex-direction: column; justify-content: center; padding: 34px; border: 1px dashed rgba(17,23,34,0.2); border-radius: 14px; min-height: 220px;\">\n          <div style=\"position: absolute; inset: 0; border-radius: 14px; background: repeating-linear-gradient(45deg, rgba(17,23,34,0.02) 0 10px, transparent 10px 20px); pointer-events: none;\"><\u002Fdiv>\n          <div style=\"position: relative; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: #5c6473; margin-bottom: 16px;\">▸ NEXT · TBD<\u002Fdiv>\n          <h3 style=\"position: relative; font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 22px; margin: 0 0 10px; color: #6a7285;\">More in development<\u002Fh3>\n          <p style=\"position: relative; font-size: 14.5px; line-height: 1.6; color: #5c6473; margin: 0;\">Celeritas is an umbrella for applied clinical-AI work. Additional threads will surface here as they mature.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOUNDER -->\n  <section id=\"founder\" data-screen-label=\"Founder\" style=\"position: relative; padding: clamp(80px, 12vh, 140px) clamp(20px, 5vw, 64px); border-top: 1px solid rgba(17,23,34,0.07);\">\n    <div data-reveal=\"\" style=\"max-width: 1100px; margin: 0 auto;\">\n      <div style=\"display: flex; align-items: baseline; gap: 18px; margin-bottom: 36px;\">\n        <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--acc,#2f5cff); letter-spacing: 0.1em;\">03<\u002Fspan>\n        <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: clamp(28px, 4vw, 48px); letter-spacing: -0.02em; margin: 0; color: #0d111a;\">Built by the specialist on the other end of the phone<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 200px 1fr; gap: 40px; align-items: start;\">\n        <img src=\"06ab7054-c8f3-4919-a3a1-294ea278b41a\" alt=\"Benson Hsu, MD, MBA — Founder, Celeritas\" style=\"display: block; width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 8px; border: 1px solid rgba(17,23,34,0.14); box-shadow: 0 8px 28px rgba(17,23,34,0.12);\">\n        <div style=\"min-width: 0;\">\n          <h3 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 24px; margin: 0 0 4px; color: #0d111a;\">Benson Hsu, MD, MBA, FAAP, FCCM<\u002Fh3>\n          <p style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#5c6473;margin:0 0 22px;letter-spacing:0.04em;\">Founder, Celeritas · pediatric intensivist &amp; professor<\u002Fp>\n          <p style=\"font-size: 15.5px; line-height: 1.7; color: #4c5568; margin: 0 0 20px;\">Board-certified in pediatrics and pediatric critical care, with 75+ publications and contributions to 10+ national practice guidelines — including the Surviving Sepsis Campaign children's guidelines. Former health-system VP of enterprise data &amp; analytics leading a 70-member team across a $6B+ system. Princeton AB; Duke MBA; Harvard Kennedy School; former McKinsey. Bush Fellow, Aspen Health Innovators Fellow, Presidential Leadership Scholar.<\u002Fp>\n          <blockquote style=\"margin: 0; padding: 22px 26px; border-left: 2px solid var(--acc,#2f5cff); background: rgba(47,92,255,0.05); font-size: 17px; line-height: 1.6; color: #1a2030; font-style: italic; border-radius: 0 8px 8px 0;\">\"As a PICU attending in rural America, I've been the specialist physicians call at 2 AM when a child is deteriorating. I've taken thousands of those calls. This is what I wish every one of those physicians had in their pocket.\"<\u002Fblockquote>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" data-screen-label=\"Contact\" style=\"position: relative; padding: clamp(80px, 13vh, 150px) clamp(20px, 5vw, 64px); border-top: 1px solid rgba(17,23,34,0.07); background: #eaecf1; overflow: hidden;\">\n    <div data-reveal=\"\" style=\"position: relative; max-width: 820px; margin: 0 auto; text-align: center;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11.5px; letter-spacing: 0.16em; color: var(--acc,#2f5cff); text-transform: uppercase; margin-bottom: 28px;\">Let's talk<\u002Fdiv>\n      <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: clamp(30px, 5vw, 60px); line-height: 1.05; letter-spacing: -0.025em; margin: 0 0 26px; color: #0d111a; text-wrap: balance;\">Building clinical AI, buying it, or want to help test it?<\u002Fh2>\n      <p style=\"font-size: 17px; line-height: 1.6; color: #4c5568; max-width: 58ch; margin: 0 auto 40px;\">We're speaking with health systems, clinical-AI builders, and pediatric clinicians interested in the working group. No demos, no waitlist — just a conversation.<\u002Fp>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;\">\n        <a href=\"mailto:benson.hsu@celeritashealth.com\" style=\"display: inline-flex; align-items: center; gap: 10px; background: var(--acc,#2f5cff); color: #fff; padding: 16px 30px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; letter-spacing: 0.03em; font-weight: 500;\">benson.hsu@celeritashealth.com<\u002Fa>\n        <a href=\"research.html\" style=\"display: inline-flex; align-items: center; gap: 10px; background: #fff; color: #121722; padding: 16px 30px; border-radius: 6px; border: 1px solid rgba(17,23,34,0.14); font-family: 'JetBrains Mono', monospace; font-size: 13.5px; letter-spacing: 0.03em;\">Join the clinical working group<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"position: relative; padding: 54px clamp(20px, 5vw, 64px); border-top: 1px solid rgba(17,23,34,0.07); background: #f4f5f8;\">\n    <div style=\"max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 30px; justify-content: space-between; align-items: flex-start;\">\n      <div style=\"max-width: 460px;\">\n        <div style=\"display: flex; align-items: center; gap: 11px; margin-bottom: 16px;\">\n          <span style=\"position: relative; width: 20px; height: 20px; display: inline-flex; transform: rotate(45deg); border: 1.5px solid var(--acc,#2f5cff);\"><span style=\"position: absolute; inset: 3px; border: 1px solid #0e9aa7;\"><\u002Fspan><\u002Fspan>\n          <span style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase; color: #121722;\">Celeritas<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size: 13px; line-height: 1.6; color: #5c6473; margin: 0;\">Applied clinical-AI work and open research into how healthcare AI should be tested.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #5c6473; line-height: 2; text-align: right;\">\n        <div><a href=\"codebluepeds.html\" style=\"color:#4c5568;\">CodeBlue Peds<\u002Fa><\u002Fdiv>\n        <div><a href=\"research.html\" style=\"color:#4c5568;\">Research<\u002Fa><\u002Fdiv>\n        <div><a href=\"#approach\" style=\"color:#4c5568;\">Approach<\u002Fa><\u002Fdiv>\n        <div><a href=\"mailto:benson.hsu@celeritashealth.com\" style=\"color:#4c5568;\">Contact<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width: 1200px; margin: 36px auto 0; padding-top: 24px; border-top: 1px solid rgba(17,23,34,0.06); display: flex; flex-wrap: wrap; gap: 16px; justify-content: space-between;\">\n      <p style=\"font-size: 11.5px; color: #5c6473; margin: 0; font-family: 'JetBrains Mono', monospace;\">© 2026 Celeritas · celeritashealth.com<\u002Fp>\n      <p style=\"font-size: 11.5px; color: #5c6473; margin: 0; max-width: 62ch; line-height: 1.55;\">For informational and educational purposes only. Not a substitute for clinical judgment. Not FDA-cleared. No evaluations have been issued and no certification currently exists.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: 820}, &quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#2f5cff&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#2f5cff&quot;, &quot;#1b6ef3&quot;, &quot;#5b3df5&quot;, &quot;#0e9aa7&quot;, &quot;#c07d18&quot;], &quot;section&quot;: &quot;Theme&quot;}, &quot;reduceMotion&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  setRoot = (el) => { this.root = el; if (el) this.applyAccent(); };\n  setMesh = (el) => { this.canvas = el; };\n\n  renderVals() { return { setRoot: this.setRoot, setMesh: this.setMesh }; }\n\n  applyAccent() {\n    if (!this.root) return;\n    this.root.style.setProperty('--acc', this.props.accent || '#2f5cff');\n  }\n  componentDidUpdate() { this.applyAccent(); }\n\n  componentDidMount() {\n    this.applyAccent();\n    const reduce = this.props.reduceMotion || window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    const els = this.root ? this.root.querySelectorAll('[data-reveal]') : [];\n    els.forEach((el) => {\n      el.style.transition = 'opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1)';\n      if (!reduce) { el.style.opacity = '0'; el.style.transform = 'translateY(26px)'; }\n    });\n    if (reduce) { els.forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; }); }\n    else if ('IntersectionObserver' in window) {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => { if (e.isIntersecting) { e.target.style.opacity = '1'; e.target.style.transform = 'translateY(0)'; io.unobserve(e.target); } });\n      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n      els.forEach((el) => io.observe(el));\n    } else { els.forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; }); }\n\n    const counts = this.root ? this.root.querySelectorAll('[data-count]') : [];\n    const runCount = (el) => {\n      const target = parseFloat(el.getAttribute('data-count'));\n      const suffix = el.getAttribute('data-suffix') || '';\n      const dur = 1100; const t0 = performance.now();\n      const step = (t) => {\n        const p = Math.min(1, (t - t0) / dur);\n        const eased = 1 - Math.pow(1 - p, 3);\n        el.textContent = Math.round(target * eased) + suffix;\n        if (p < 1) requestAnimationFrame(step); else el.textContent = target + suffix;\n      };\n      requestAnimationFrame(step);\n    };\n    if (reduce) { counts.forEach((el) => { el.textContent = el.getAttribute('data-count') + (el.getAttribute('data-suffix') || ''); }); }\n    else if ('IntersectionObserver' in window) {\n      const io2 = new IntersectionObserver((entries) => { entries.forEach((e) => { if (e.isIntersecting) { runCount(e.target); io2.unobserve(e.target); } }); }, { threshold: 0.6 });\n      counts.forEach((el) => io2.observe(el));\n    } else { counts.forEach((el) => runCount(el)); }\n\n    if (this.canvas && !reduce) this.startMesh();\n  }\n\n  startMesh() {\n    const canvas = this.canvas; if (canvas.getBoundingClientRect().width < 600) return;\n    const ctx = canvas.getContext('2d');\n    let w, h, dpr, nodes = [], raf, mouse = { x: -9999, y: -9999 };\n    const accent = () => (this.props.accent || '#2f5cff');\n    const hexRgb = (hex) => { const m = hex.replace('#', ''); const n = parseInt(m.length === 3 ? m.split('').map(c => c + c).join('') : m, 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; };\n    const resize = () => {\n      dpr = Math.min(window.devicePixelRatio || 1, 2);\n      const r = canvas.getBoundingClientRect(); w = r.width; h = r.height;\n      canvas.width = w * dpr; canvas.height = h * dpr; ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      const count = Math.min(76, Math.round((w * h) / 15500)); nodes = [];\n      for (let i = 0; i < count; i++) nodes.push({ x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - 0.5) * 0.13, vy: (Math.random() - 0.5) * 0.13 });\n    };\n    const draw = () => {\n      ctx.clearRect(0, 0, w, h);\n      const [r, g, b] = hexRgb(accent()); const teal = [14, 154, 167]; const maxD = 134;\n      for (let i = 0; i < nodes.length; i++) {\n        const n = nodes[i]; n.x += n.vx; n.y += n.vy;\n        if (n.x < 0 || n.x > w) n.vx *= -1; if (n.y < 0 || n.y > h) n.vy *= -1;\n        const dmx = n.x - mouse.x, dmy = n.y - mouse.y, dm = Math.hypot(dmx, dmy);\n        if (dm < 150) { n.x += (dmx / dm) * 0.7; n.y += (dmy / dm) * 0.7; }\n      }\n      for (let i = 0; i < nodes.length; i++) for (let j = i + 1; j < nodes.length; j++) {\n        const a = nodes[i], c = nodes[j]; const d = Math.hypot(a.x - c.x, a.y - c.y);\n        if (d < maxD) { const o = (1 - d / maxD) * 0.18; ctx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + o + ')'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(c.x, c.y); ctx.stroke(); }\n      }\n      for (let i = 0; i < nodes.length; i++) { const n = nodes[i]; const col = i % 5 === 0 ? teal : [r, g, b]; ctx.fillStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',0.9)'; ctx.beginPath(); ctx.arc(n.x, n.y, i % 5 === 0 ? 2.2 : 1.5, 0, Math.PI * 2); ctx.fill(); }\n      raf = requestAnimationFrame(draw);\n    };\n    const onMove = (e) => { const r = canvas.getBoundingClientRect(); mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; };\n    const onLeave = () => { mouse.x = -9999; mouse.y = -9999; };\n    resize(); window.addEventListener('resize', resize); window.addEventListener('mousemove', onMove); canvas.addEventListener('mouseleave', onLeave); draw(); setTimeout(() => cancelAnimationFrame(raf), 4000);\n    this._cleanupMesh = () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); window.removeEventListener('mousemove', onMove); canvas.removeEventListener('mouseleave', onLeave); };\n  }\n\n  componentWillUnmount() { if (this._cleanupMesh) this._cleanupMesh(); }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"</script>
